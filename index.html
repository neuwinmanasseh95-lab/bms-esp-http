<!DOCTYPE html>
<html>
<head>
  <title>BMS Monitor</title>
</head>
<body>

<h1>ESP32 BMS Dashboard</h1>

<h2 id="device"></h2>
<p>RSSI: <span id="rssi"></span></p>

<h3>Temperatures</h3>
<ul id="temps"></ul>

<h3>Pack 1</h3>
<p id="p1"></p>

<h3>Pack 2</h3>
<p id="p2"></p>

<script>
async function loadData() {
  const res = await fetch("/api/bms");
  const data = await res.json();

  if (!data.device_id) return;

  document.getElementById("device").innerText = data.device_id;
  document.getElementById("rssi").innerText = data.wifi_rssi;

  // Temps
  let tempHTML = "";
  data.temperature_c.forEach((t, i) => {
    tempHTML += `<li>Sensor ${i}: ${t ?? "N/A"} °C</li>`;
  });
  document.getElementById("temps").innerHTML = tempHTML;

  // Pack 1
  document.getElementById("p1").innerText =
    `Total: ${data.pack1.total_v}V | Current: ${data.pack1.current_a}A | Power: ${data.pack1.power_w}W`;

  // Pack 2
  document.getElementById("p2").innerText =
    `Total: ${data.pack2.total_v}V | Current: ${data.pack2.current_a}A | Power: ${data.pack2.power_w}W`;
}

setInterval(loadData, 2000);
</script>

</body>
</html>
