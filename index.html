<!DOCTYPE html>
<html>
<head>
  <title>BMS Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🔋 ESP32 BMS Dashboard</h1>

<div class="card">
  <h2>Status: <span id="status">...</span></h2>
  <p>Last Update: <span id="time">...</span></p>
</div>

<div class="card">
  <h2>Pack 1</h2>
  <p>Total Voltage: <span id="p1v"></span> V</p>
  <p>Current: <span id="p1a"></span> A</p>
  <p>Power: <span id="p1w"></span> W</p>
</div>

<div class="card">
  <h2>Pack 2</h2>
  <p>Total Voltage: <span id="p2v"></span> V</p>
  <p>Current: <span id="p2a"></span> A</p>
  <p>Power: <span id="p2w"></span> W</p>
</div>

<script>
const API = "/api/bms";

async function fetchData() {
  try {
    const res = await fetch(API);
    const json = await res.json();

    document.getElementById("status").innerText = json.status;

    if (!json.data) return;

    document.getElementById("time").innerText =
      new Date(json.last_received).toLocaleTimeString();

    const p1 = json.data.pack1;
    const p2 = json.data.pack2;

    document.getElementById("p1v").innerText = p1.total_v;
    document.getElementById("p1a").innerText = p1.current_a;
    document.getElementById("p1w").innerText = p1.power_w;

    document.getElementById("p2v").innerText = p2.total_v;
    document.getElementById("p2a").innerText = p2.current_a;
    document.getElementById("p2w").innerText = p2.power_w;

  } catch (e) {
    console.log("Error:", e);
  }
}

setInterval(fetchData, 1000);
</script>

</body>
</html>
